<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340">
      <stop offset="0%" stop-color="#040816"/>
      <stop offset="52%" stop-color="#0a1124"/>
      <stop offset="100%" stop-color="#09111f"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(330 130) rotate(-8) scale(340 220)">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.42"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(890 215) rotate(10) scale(340 210)">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(600 170) scale(260 130)">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameGrad" x1="360" y1="110" x2="850" y2="235" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="45%" stop-color="#c084fc"/>
      <stop offset="75%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="260" y1="90" x2="940" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.72"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.68"/>
    </linearGradient>

    <linearGradient id="waveGrad" x1="150" y1="0" x2="1050" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a855f7" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#f0abfc" stop-opacity="0.20"/>
      <stop offset="80%" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <filter id="blurXL" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <filter id="blurM" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <style>
      .name {
        font: 700 64px Inter, 'Segoe UI', Arial, sans-serif;
        letter-spacing: 0.8px;
      }
      .sub {
        font: 400 19px Inter, 'Segoe UI', Arial, sans-serif;
        fill: #a5b4cc;
        letter-spacing: 0.5px;
      }
      .over {
        font: 500 12px Inter, 'Segoe UI', Arial, sans-serif;
        fill: #7c8aa5;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <rect width="1200" height="340" rx="30" fill="url(#bg)"/>

  <!-- layered ambient glow -->
  <ellipse cx="330" cy="130" rx="320" ry="190" fill="url(#glowLeft)" filter="url(#blurXL)">
    <animate attributeName="cx" values="330;385;330" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="130;120;130" dur="9s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="890" cy="215" rx="320" ry="190" fill="url(#glowRight)" filter="url(#blurXL)">
    <animate attributeName="cx" values="890;840;890" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="215;225;215" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="600" cy="170" rx="250" ry="115" fill="url(#centerGlow)" filter="url(#blurM)">
    <animate attributeName="rx" values="250;275;250" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- futuristic soft waves -->
  <g opacity="0.7">
    <path d="M120 252 C290 222, 430 282, 600 252 S910 222, 1080 252" fill="none" stroke="url(#waveGrad)" stroke-width="1.25">
      <animate attributeName="d"
        values="M120 252 C290 222, 430 282, 600 252 S910 222, 1080 252;
                M120 252 C290 272, 430 232, 600 252 S910 282, 1080 252;
                M120 252 C290 222, 430 282, 600 252 S910 222, 1080 252"
        dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="7s" repeatCount="indefinite"/>
    </path>

    <path d="M140 98 C310 128, 450 68, 600 98 S900 128, 1060 98" fill="none" stroke="url(#waveGrad)" stroke-width="1">
      <animate attributeName="d"
        values="M140 98 C310 128, 450 68, 600 98 S900 128, 1060 98;
                M140 98 C310 78, 450 128, 600 98 S900 68, 1060 98;
                M140 98 C310 128, 450 68, 600 98 S900 128, 1060 98"
        dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.22;0.08" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- elegant orbital frame -->
  <ellipse cx="600" cy="170" rx="315" ry="104" fill="none" stroke="url(#ringGrad)" stroke-width="1.35" stroke-dasharray="8 13">
    <animateTransform attributeName="transform" type="rotate" from="0 600 170" to="360 600 170" dur="28s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.28;0.62;0.28" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="600" cy="170" rx="272" ry="82" fill="none" stroke="url(#ringGrad)" stroke-width="1.05" stroke-dasharray="3 16">
    <animateTransform attributeName="transform" type="rotate" from="360 600 170" to="0 600 170" dur="22s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0.42;0.18" dur="6.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- soft feminine shimmer -->
  <g opacity="0.8">
    <circle cx="360" cy="86" r="2.3" fill="#f5d0fe">
      <animate attributeName="cy" values="86;79;86" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="825" cy="82" r="2.2" fill="#e9d5ff">
      <animate attributeName="cy" values="82;89;82" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.85;0.18" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="228" r="2.5" fill="#67e8f9">
      <animate attributeName="cx" values="930;922;930" dur="4.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.95;0.15" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="272" cy="224" r="2.1" fill="#c084fc">
      <animate attributeName="cx" values="272;280;272" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.8;0.18" dur="3.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- centered content -->
  <g text-anchor="middle">
    <text x="600" y="115" class="over">GITHUB PROFILE</text>
    <text x="600" y="178" class="name" fill="url(#nameGrad)">Trisha Dabral</text>
    <text x="600" y="220" class="sub">Computer Science Student • Algorithms • Full-Stack Development</text>
  </g>
</svg>
