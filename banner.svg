<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0015"/>
      <stop offset="35%" stop-color="#1a0a2e"/>
      <stop offset="70%" stop-color="#16103a"/>
      <stop offset="100%" stop-color="#0d0015"/>
    </linearGradient>

    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>

    <linearGradient id="accent3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <radialGradient id="orb-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f9a8d4" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <clipPath id="banner-clip">
      <rect width="1200" height="400" rx="16"/>
    </clipPath>

    <style>
      .name { font: 800 64px 'Outfit', Inter, Arial, sans-serif; }
      .tagline { font: 400 20px 'JetBrains Mono', Consolas, monospace; fill: #c4b5fd; opacity: 0.85; }
      .subtitle { font: 300 16px 'Outfit', Inter, Arial, sans-serif; fill: #93c5fd; opacity: 0.70; }
      .gridline { stroke: #c4b5fd; stroke-width: 0.5; opacity: 0.06; }
      .orbFloat1 { animation: none; }
      .orbFloat2 { animation: none; }
    </style>
  </defs>

  <g clip-path="url(#banner-clip)">
    <rect width="1200" height="400" fill="url(#bg-grad)"/>

    <!-- Ambient orbs -->
    <circle cx="150" cy="100" r="180" fill="url(#orb-pink)" filter="url(#soft-glow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="rotate" values="0 150 100; 3 150 100; 0 150 100" dur="8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1050" cy="300" r="200" fill="url(#orb-blue)" filter="url(#soft-glow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="10s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" additive="sum" type="rotate" values="0 1050 300; -2 1050 300; 0 1050 300" dur="10s" repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="200" r="250" fill="url(#orb-purple)" filter="url(#soft-glow)">
      <animate attributeName="opacity" values="0.40;0.80;0.40" dur="6s" repeatCount="indefinite"/>
    </circle>

    <!-- Grid -->
    <g>
      <line x1="0" y1="0" x2="0" y2="400" class="gridline"/>
      <line x1="60" y1="0" x2="60" y2="400" class="gridline"/>
      <line x1="120" y1="0" x2="120" y2="400" class="gridline"/>
      <line x1="180" y1="0" x2="180" y2="400" class="gridline"/>
      <line x1="240" y1="0" x2="240" y2="400" class="gridline"/>
      <line x1="300" y1="0" x2="300" y2="400" class="gridline"/>
      <line x1="360" y1="0" x2="360" y2="400" class="gridline"/>
      <line x1="420" y1="0" x2="420" y2="400" class="gridline"/>
      <line x1="480" y1="0" x2="480" y2="400" class="gridline"/>
      <line x1="540" y1="0" x2="540" y2="400" class="gridline"/>
      <line x1="600" y1="0" x2="600" y2="400" class="gridline"/>
      <line x1="660" y1="0" x2="660" y2="400" class="gridline"/>
      <line x1="720" y1="0" x2="720" y2="400" class="gridline"/>
      <line x1="780" y1="0" x2="780" y2="400" class="gridline"/>
      <line x1="840" y1="0" x2="840" y2="400" class="gridline"/>
      <line x1="900" y1="0" x2="900" y2="400" class="gridline"/>
      <line x1="960" y1="0" x2="960" y2="400" class="gridline"/>
      <line x1="1020" y1="0" x2="1020" y2="400" class="gridline"/>
      <line x1="1080" y1="0" x2="1080" y2="400" class="gridline"/>
      <line x1="1140" y1="0" x2="1140" y2="400" class="gridline"/>
      <line x1="1200" y1="0" x2="1200" y2="400" class="gridline"/>

      <line x1="0" y1="60" x2="1200" y2="60" class="gridline"/>
      <line x1="0" y1="120" x2="1200" y2="120" class="gridline"/>
      <line x1="0" y1="180" x2="1200" y2="180" class="gridline"/>
      <line x1="0" y1="240" x2="1200" y2="240" class="gridline"/>
      <line x1="0" y1="300" x2="1200" y2="300" class="gridline"/>
      <line x1="0" y1="360" x2="1200" y2="360" class="gridline"/>
    </g>

    <!-- Decorative dashed paths -->
    <path d="M0 320 Q300 250 600 300 T1200 260" fill="none" stroke="url(#accent2)" stroke-width="1.5" opacity="0.2" stroke-dasharray="8 12" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="0" to="-1000" dur="30s" repeatCount="indefinite"/>
    </path>

    <path d="M0 100 Q400 180 700 120 T1200 160" fill="none" stroke="url(#accent1)" stroke-width="1" opacity="0.15" stroke-dasharray="6 10" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="0" to="-1000" dur="25s" repeatCount="indefinite"/>
    </path>

    <!-- Floating shapes -->
    <g opacity="0.12">
      <rect x="80" y="60" width="30" height="30" rx="4" fill="none" stroke="#f9a8d4" stroke-width="1.5" transform="rotate(15 95 75)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="7s" repeatCount="indefinite" additive="sum"/>
        <animateTransform attributeName="transform" additive="sum" type="rotate" values="15 95 75; 18 95 75; 15 95 75" dur="7s" repeatCount="indefinite"/>
      </rect>

      <circle cx="1100" cy="80" r="12" fill="none" stroke="#93c5fd" stroke-width="1.5">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="9s" repeatCount="indefinite"/>
      </circle>

      <polygon points="1050,340 1065,310 1080,340" fill="none" stroke="#c4b5fd" stroke-width="1.5">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="6s" repeatCount="indefinite"/>
      </polygon>

      <rect x="180" y="300" width="20" height="20" rx="3" fill="none" stroke="#a855f7" stroke-width="1" transform="rotate(-10 190 310)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="8s" repeatCount="indefinite" additive="sum"/>
        <animateTransform attributeName="transform" additive="sum" type="rotate" values="-10 190 310; -12 190 310; -10 190 310" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Dots -->
    <g fill="#c4b5fd">
      <circle cx="300" cy="50" r="1.5" opacity="0.6"/>
      <circle cx="500" cy="80" r="1" opacity="0.4"/>
      <circle cx="750" cy="45" r="1.5" opacity="0.5"/>
      <circle cx="900" cy="90" r="1" opacity="0.3"/>
      <circle cx="200" cy="200" r="1" opacity="0.4"/>
      <circle cx="1000" cy="180" r="1.5" opacity="0.5"/>
      <circle cx="400" cy="350" r="1" opacity="0.3"/>
      <circle cx="800" cy="360" r="1.5" opacity="0.4"/>
      <circle cx="650" cy="70" r="2" opacity="0.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="350" cy="150" r="1.5" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" begin="1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Code brackets -->
    <text x="60" y="200" font-family="'JetBrains Mono', Consolas, monospace" font-size="80" font-weight="400" fill="url(#accent3)" opacity="0.12">{</text>
    <text x="1100" y="240" font-family="'JetBrains Mono', Consolas, monospace" font-size="80" font-weight="400" fill="url(#accent3)" opacity="0.12">}</text>

    <!-- Main text -->
    <text x="600" y="170" text-anchor="middle" class="name" fill="url(#accent2)" filter="url(#glow)">Trisha Dabral</text>
    <text x="600" y="230" text-anchor="middle" class="tagline">Developer • Creator • Builder</text>
    <line x1="440" y1="252" x2="760" y2="252" stroke="url(#accent2)" stroke-width="1" opacity="0.3"/>
    <text x="600" y="285" text-anchor="middle" class="subtitle">welcome to my profile</text>

    <!-- Bottom dots -->
    <g fill="url(#accent2)" opacity="0.4">
      <circle cx="570" cy="330" r="3"/>
      <circle cx="590" cy="330" r="3"/>
      <circle cx="610" cy="330" r="3"/>
      <circle cx="630" cy="330" r="3"/>
    </g>
  </g>
</svg>
