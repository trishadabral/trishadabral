<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 80) rotate(25) scale(300 180)">
      <stop stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 250) rotate(-12) scale(260 160)">
      <stop stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassStroke" x1="170" y1="55" x2="1030" y2="265" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="230" y1="110" x2="700" y2="205" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="cardShadow" x="120" y="20" width="960" height="280" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font: 700 52px 'Segoe UI', Inter, Arial, sans-serif; letter-spacing: 0.2px; }
      .subtitle { font: 500 20px 'Segoe UI', Inter, Arial, sans-serif; fill: #CBD5E1; }
      .pillText { font: 600 15px 'Segoe UI', Inter, Arial, sans-serif; fill: #E2E8F0; }
      .mono { font: 600 14px Consolas, 'SFMono-Regular', monospace; fill: #A78BFA; }
    </style>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <circle cx="210" cy="80" r="180" fill="url(#glow1)">
    <animate attributeName="cx" values="210;250;210" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;95;80" dur="9s" repeatCount="indefinite"/>
  </circle>

  <circle cx="980" cy="250" r="160" fill="url(#glow2)">
    <animate attributeName="cx" values="980;940;980" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="250;228;250" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.35" filter="url(#blur)">
    <path d="M860 54C920 70 952 120 1020 133C1080 145 1136 122 1168 102" stroke="#8B5CF6" stroke-width="2"/>
    <path d="M820 250C900 212 962 244 1038 229C1102 217 1143 182 1171 145" stroke="#22D3EE" stroke-width="2"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="170" y="48" width="860" height="224" rx="28" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="170.8" y="48.8" width="858.4" height="222.4" rx="27.2" stroke="url(#glassStroke)" stroke-opacity="0.55" stroke-width="1.6"/>
  </g>

  <g opacity="0.18">
    <rect x="200" y="80" width="310" height="150" rx="22" fill="#FFFFFF"/>
    <rect x="214" y="96" width="106" height="10" rx="5" fill="#FFFFFF"/>
    <rect x="214" y="122" width="180" height="10" rx="5" fill="#FFFFFF"/>
    <rect x="214" y="148" width="132" height="10" rx="5" fill="#FFFFFF"/>
    <rect x="214" y="186" width="268" height="26" rx="13" fill="#FFFFFF"/>
  </g>

  <g transform="translate(230 95)">
    <text x="0" y="0" class="mono">&lt; profile /&gt;</text>
    <text x="0" y="64" class="title" fill="url(#textGradient)">Trisha Dabral</text>
    <text x="0" y="104" class="subtitle">Computer Science Student • Algorithms • Full-Stack Development</text>
    <text x="0" y="138" class="subtitle">Building clean, thoughtful systems with a dark UI aesthetic.</text>

    <g transform="translate(0 168)">
      <rect x="0" y="0" width="126" height="38" rx="19" fill="#8B5CF6" fill-opacity="0.16" stroke="#A78BFA" stroke-opacity="0.5"/>
      <text x="63" y="24" text-anchor="middle" class="pillText">C++</text>

      <rect x="140" y="0" width="126" height="38" rx="19" fill="#22D3EE" fill-opacity="0.14" stroke="#7DD3FC" stroke-opacity="0.38"/>
      <text x="203" y="24" text-anchor="middle" class="pillText">Spring Boot</text>

      <rect x="280" y="0" width="126" height="38" rx="19" fill="#6366F1" fill-opacity="0.14" stroke="#A5B4FC" stroke-opacity="0.36"/>
      <text x="343" y="24" text-anchor="middle" class="pillText">React</text>
    </g>
  </g>

  <g transform="translate(835 82)">
    <rect x="0" y="0" width="138" height="138" rx="28" fill="#0F172A" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <g transform="translate(24 23)">
      <rect x="0" y="58" width="18" height="32" rx="9" fill="#8B5CF6">
        <animate attributeName="height" values="32;54;32" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="58;36;58" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="26" y="38" width="18" height="52" rx="9" fill="#A78BFA">
        <animate attributeName="height" values="52;28;52" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="38;62;38" dur="2.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="52" y="16" width="18" height="74" rx="9" fill="#22D3EE">
        <animate attributeName="height" values="74;44;74" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="16;46;16" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="78" y="48" width="18" height="42" rx="9" fill="#60A5FA">
        <animate attributeName="height" values="42;64;42" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="48;26;48" dur="2.8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="1030" cy="76" r="3.4" fill="#C4B5FD">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="98" r="2.6" fill="#67E8F9">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1076" cy="68" r="2.8" fill="#DDD6FE">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
