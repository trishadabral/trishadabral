<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="55%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#39c5cf"/>
    </linearGradient>

    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>

    <radialGradient id="orb-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39c5cf" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#39c5cf" stop-opacity="0"/>
    </radialGradient>

    <filter id="text-soft">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <clipPath id="banner-clip">
      <rect width="1200" height="400" rx="16"/>
    </clipPath>

    <style>
      .gridline { stroke: #30363d; stroke-width: 0.7; opacity: 0.18; }
      .name { font: 800 62px Outfit, Inter, Arial, sans-serif; letter-spacing: 0.4px; }
      .tagline { font: 400 19px 'JetBrains Mono', Consolas, monospace; fill: #8b949e; opacity: 0.95; }
      .subtitle { font: 300 16px Outfit, Inter, Arial, sans-serif; fill: #6e7681; opacity: 0.95; }
      .brace { font: 400 84px 'JetBrains Mono', Consolas, monospace; opacity: 0.09; }
    </style>
  </defs>

  <g clip-path="url(#banner-clip)">
    <rect width="1200" height="400" fill="url(#bg-grad)"/>

    <!-- ambient background -->
    <circle cx="170" cy="105" r="180" fill="url(#orb-purple)" filter="url(#soft-glow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 8 -8; 0 0" dur="9s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1020" cy="290" r="190" fill="url(#orb-blue)" filter="url(#soft-glow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 8; 0 0" dur="11s" repeatCount="indefinite"/>
    </circle>

    <circle cx="620" cy="220" r="220" fill="url(#orb-cyan)" filter="url(#soft-glow)">
      <animate attributeName="opacity" values="0.45;0.75;0.45" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- grid -->
    <g>
      <line x1="0" y1="60" x2="1200" y2="60" class="gridline"/>
      <line x1="0" y1="120" x2="1200" y2="120" class="gridline"/>
      <line x1="0" y1="180" x2="1200" y2="180" class="gridline"/>
      <line x1="0" y1="240" x2="1200" y2="240" class="gridline"/>
      <line x1="0" y1="300" x2="1200" y2="300" class="gridline"/>
      <line x1="0" y1="360" x2="1200" y2="360" class="gridline"/>

      <line x1="120" y1="0" x2="120" y2="400" class="gridline"/>
      <line x1="240" y1="0" x2="240" y2="400" class="gridline"/>
      <line x1="360" y1="0" x2="360" y2="400" class="gridline"/>
      <line x1="480" y1="0" x2="480" y2="400" class="gridline"/>
      <line x1="600" y1="0" x2="600" y2="400" class="gridline"/>
      <line x1="720" y1="0" x2="720" y2="400" class="gridline"/>
      <line x1="840" y1="0" x2="840" y2="400" class="gridline"/>
      <line x1="960" y1="0" x2="960" y2="400" class="gridline"/>
      <line x1="1080" y1="0" x2="1080" y2="400" class="gridline"/>
    </g>

    <!-- subtle flowing lines -->
    <path d="M0 315 Q290 270 590 305 T1200 270" fill="none" stroke="url(#accent2)" stroke-width="1.2" opacity="0.10" stroke-dasharray="7 12">
      <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="28s" repeatCount="indefinite"/>
    </path>

    <path d="M0 95 Q390 155 710 115 T1200 150" fill="none" stroke="url(#accent1)" stroke-width="1" opacity="0.08" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="22s" repeatCount="indefinite"/>
    </path>

    <!-- tiny details -->
    <g fill="#8b949e" opacity="0.55">
      <circle cx="300" cy="72" r="1.7"/>
      <circle cx="500" cy="102" r="1.2"/>
      <circle cx="760" cy="68" r="1.7"/>
      <circle cx="915" cy="92" r="1.2"/>
      <circle cx="205" cy="205" r="1.1"/>
      <circle cx="1012" cy="182" r="1.5"/>
      <circle cx="402" cy="353" r="1.1"/>
      <circle cx="812" cy="346" r="1.4"/>
    </g>

    <!-- braces -->
    <text x="88" y="220" class="brace" fill="#bc8cff">{</text>
    <text x="1115" y="220" text-anchor="end" class="brace" fill="#58a6ff">}</text>

    <!-- content -->
    <text x="600" y="172" text-anchor="middle" class="name" fill="url(#accent2)" opacity="0.92" filter="url(#text-soft)">
      Trisha Dabral
    </text>

    <text x="600" y="228" text-anchor="middle" class="tagline">
      Algorithms • Systems • Development
    </text>

    <line x1="470" y1="246" x2="730" y2="246" stroke="url(#accent2)" stroke-width="0.8" opacity="0.12"/>

    <text x="600" y="278" text-anchor="middle" class="subtitle">
      Selected work below
    </text>
  </g>
</svg>
